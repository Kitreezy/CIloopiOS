name: CIloopiOS
options:
  bundleIdPrefix: com.ostin.cliopios
  deploymentTarget:
    iOS: "18.0"

settings:
  SWIFT_VERSION: "6.0"

targets:
  CIloopiOS:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Core
      - path: Features
      - path: Resources
    info:
      path: Resources/Info.plist
      properties:
        UILaunchScreen: {}
        NSLocalNetworkUsageDescription: "Приложению нужен доступ к локальной сети для подключения к агенту на Mac."
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ostin.cliopios
        TARGETED_DEVICE_FAMILY: "1"
